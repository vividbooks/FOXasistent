# Statická app ze static-web/ → GitHub Pages. Vite načte static-web/.env.production (veřejný Supabase klíč).
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: static-web/package-lock.json
      - name: Install & build static site
        working-directory: static-web
        env:
          # Volitelně: Repository secret — URL Next na Vercelu pro OCR (bez koncového /)
          VITE_EXTRACT_API_BASE: ${{ secrets.VITE_EXTRACT_API_BASE }}
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
