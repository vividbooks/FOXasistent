# Statická app ze static-web/ → GitHub Pages. Vite načte static-web/.env.production (veřejný Supabase klíč).
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: static-web/package-lock.json
      # Exportuj jen neprázdné vars — prázdný env by přepsal hodnoty ze static-web/.env.production (Vite).
      - name: Install & build static site
        working-directory: static-web
        run: |
          if [ -n "${{ vars.VERCEL_APP_URL }}" ]; then export VITE_NEXT_API_ORIGIN="${{ vars.VERCEL_APP_URL }}"; fi
          if [ -n "${{ vars.SUPABASE_STORAGE_BUCKET }}" ]; then export VITE_SUPABASE_STORAGE_BUCKET="${{ vars.SUPABASE_STORAGE_BUCKET }}"; fi
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
